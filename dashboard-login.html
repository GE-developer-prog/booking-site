<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Breathe Easy Stretch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/src/css/main.css" />
  <link rel="icon" type="image/png" href="public/images/favicon.svg" />
</head>
<body class="dash-body">

  <div class="login-page">
    <div class="login-card">

      <!-- Logo -->
      <div class="flex items-center gap-3 mb-8">
        <div class="w-9 h-9 rounded-full border-2 border-sage flex items-center justify-center">
          <i class="fa-solid fa-wind text-sage text-sm"></i>
        </div>
        <div>
          <p class="text-off-white font-medium text-sm">Breathe Easy Stretch</p>
          <p class="text-slate-500 text-xs">Admin Dashboard</p>
        </div>
      </div>

      <h1 class="font-display text-3xl text-off-white mb-1">Welcome back</h1>
      <p class="text-slate-500 text-sm mb-8">Sign in to manage your business</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="dash-label">Username</label>
          <input type="text" id="login-username" class="dash-input" placeholder="admin" required autocomplete="username" />
        </div>
        <div>
          <label class="dash-label">Password</label>
          <div class="relative">
            <input type="password" id="login-password" class="dash-input pr-10" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" onclick="toggleLoginPw()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors bg-transparent border-none cursor-pointer">
              <i class="fa-solid fa-eye text-sm" id="login-eye-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" id="login-btn" class="dash-btn-primary w-full py-3 text-sm mt-2">
          Sign In
        </button>
      </form>

      <p class="text-slate-600 text-xs text-center mt-6">Protected admin access only</p>
    </div>
  </div>

  <script src="/src/js/toast.js"></script>
  <script src="/src/js/api.js"></script>
  <script src="/src/js/admin-auth.js"></script>
  <script>
    // If already logged in redirect to dashboard
    window.addEventListener('DOMContentLoaded', function() {
      if (window.getAdminToken()) {
        window.navigateTo('/dashboard.html');
      }

      // Show registered success message if redirected from signup
      var params = new URLSearchParams(window.location.search);
      if (params.get('registered')) {
        window.showToast('Account created. Please sign in.', 'success');
      }
    });

    window.toggleLoginPw = function() {
      var input = document.getElementById('login-password');
      var icon  = document.getElementById('login-eye-icon');
      if (!input) return;
      input.type = input.type === 'password' ? 'text' : 'password';
      if (icon) icon.className = input.type === 'password' ? 'fa-solid fa-eye text-sm' : 'fa-solid fa-eye-slash text-sm';
    };

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var username = document.getElementById('login-username').value.trim();
      var password = document.getElementById('login-password').value;
      var btn      = document.getElementById('login-btn');

      btn.textContent = 'Signing in...';
      btn.disabled    = true;

      var success = await window.adminLogin(username, password);

      if (success) {
        window.navigateTo('/dashboard.html');
      } else {
        btn.textContent = 'Sign In';
        btn.disabled    = false;
      }
    });
  </script>
</body>
</html>
